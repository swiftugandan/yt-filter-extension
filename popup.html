<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --text: #b0b0b0;
    --text-hi: #d4d4d4;
    --text-dim: #555;
    --accent: #c62828;
    --accent2: #ff5252;
    --green: #4caf50;
    --green-dim: #1b5e20;
    --cyan: #00bcd4;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
  }

  .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .head h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-hi);
  }
  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .switch input { display: none; }
  .switch .track {
    position: absolute; inset: 0;
    background: #333;
    border-radius: 10px;
    transition: background 0.15s;
  }
  .switch .track::before {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #888;
    border-radius: 50%;
    transition: transform 0.15s, background 0.15s;
  }
  .switch input:checked + .track { background: var(--green-dim); }
  .switch input:checked + .track::before {
    transform: translateX(16px);
    background: var(--green);
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .st {
    padding: 12px 14px;
    border-right: 1px solid var(--border);
  }
  .st:last-child { border-right: none; }
  .st .v {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-hi);
    font-variant-numeric: tabular-nums;
  }
  .st .l {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
  .st.red .v { color: var(--accent2); }
  .st.grn .v { color: var(--green); }

  .rules {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    max-height: 80px;
    overflow-y: auto;
  }
  .rules .r {
    padding: 1px 0;
  }
  .rules .r::before {
    content: "│ ";
    color: #222;
  }
  .rules .rl { color: #ffab00; }
  .rules .rv { color: var(--cyan); }

  .actions {
    padding: 10px 14px;
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 6px 0;
    text-align: center;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn:hover { background: #181818; border-color: #333; color: var(--text-hi); }
  .btn-accent { border-color: var(--accent); color: var(--accent2); }
  .btn-accent:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
  <div class="head">
    <h1>ytf://</h1>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <div class="track"></div>
    </label>
  </div>

  <div class="stats">
    <div class="st red">
      <div class="v" id="hidden">—</div>
      <div class="l">hidden</div>
    </div>
    <div class="st grn">
      <div class="v" id="visible">—</div>
      <div class="l">visible</div>
    </div>
  </div>

  <div class="rules" id="rules"></div>

  <div class="actions">
    <button class="btn btn-accent" id="openPanel">control panel</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
